# Matugen template for Kitty terminal
# Generated colors from Material You palette
# Place this file at: ~/.config/matugen/templates/kitty-matugen.conf
#
# Add to your matugen config.toml:
#
#   [templates.kitty]
#   input_path  = '~/.config/matugen/templates/kitty-matugen.conf'
#   output_path = '~/.config/kitty/themes/Matugen.conf'
#   post_hook   = "kitty +kitten themes --reload-in=all Matugen"
#
# Then apply once: run `kitten themes`, pick "Matugen" under User, and confirm.
# Future runs of matugen will hot-reload all open Kitty windows automatically.

# ── Core UI ─────────────────────────────────────────────────────────────────

foreground            #ede0d4
background            #18120b

selection_foreground  #fadebc
selection_background  #56442a

# ── Cursor ──────────────────────────────────────────────────────────────────

cursor                #f3bd6e
cursor_text_color     #442b00

# ── URLs ────────────────────────────────────────────────────────────────────

url_color             #b7cea2

# ── Tab bar ─────────────────────────────────────────────────────────────────

active_tab_foreground   #ffddb2
active_tab_background   #624000
inactive_tab_foreground #d3c4b4
inactive_tab_background #4f4539
tab_bar_background      #18120b

# ── Window border ───────────────────────────────────────────────────────────

active_border_color     #f3bd6e
inactive_border_color   #9b8f80
bell_border_color        #ffb4ab

# ── ANSI colors (normal) ────────────────────────────────────────────────────

color0   #18120b
