include colors.conf

# Font customization:
font_family Hurmit Nerd Font Mono
font_size 8

# Cursor:
cursor #E0A84B
cursor_shape block
shell_integration no-cursor

cursor_trail 1

# Colors:
#foreground #99977f
#background #282929
background_opacity 0.8

# padding:
window_padding_width 3

allow_remote_control yes
