# Matugen template for Kitty terminal
# Generated colors from Material You palette
# Place this file at: ~/.config/matugen/templates/kitty-matugen.conf
#
# Add to your matugen config.toml:
#
#   [templates.kitty]
#   input_path  = '~/.config/matugen/templates/kitty-matugen.conf'
#   output_path = '~/.config/kitty/themes/Matugen.conf'
#   post_hook   = "kitty +kitten themes --reload-in=all Matugen"
#
# Then apply once: run `kitten themes`, pick "Matugen" under User, and confirm.
# Future runs of matugen will hot-reload all open Kitty windows automatically.

# ── Core UI ─────────────────────────────────────────────────────────────────

foreground            {{colors.on_background.default.hex}}
background            {{colors.background.default.hex}}

selection_foreground  {{colors.on_secondary_container.default.hex}}
selection_background  {{colors.secondary_container.default.hex}}

# ── Cursor ──────────────────────────────────────────────────────────────────

cursor                {{colors.primary.default.hex}}
cursor_text_color     {{colors.on_primary.default.hex}}

# ── URLs ────────────────────────────────────────────────────────────────────

url_color             {{colors.tertiary.default.hex}}

# ── Tab bar ─────────────────────────────────────────────────────────────────

active_tab_foreground   {{colors.on_primary_container.default.hex}}
active_tab_background   {{colors.primary_container.default.hex}}
inactive_tab_foreground {{colors.on_surface_variant.default.hex}}
inactive_tab_background {{colors.surface_variant.default.hex}}
tab_bar_background      {{colors.surface.default.hex}}

# ── Window border ───────────────────────────────────────────────────────────

active_border_color     {{colors.primary.default.hex}}
inactive_border_color   {{colors.outline.default.hex}}
bell_border_color        {{colors.error.default.hex}}

# ── ANSI colors (normal) ────────────────────────────────────────────────────

color0   {{colors.surface.default.hex}}
color1   {{colors.error.default.hex}}
color2   {{colors.primary.default.hex}}
color3   {{colors.tertiary.default.hex}}
color4   {{colors.secondary.default.hex}}
color5   {{colors.inverse_primary.default.hex}}
color6   {{colors.tertiary_container.default.hex}}
color7   {{colors.on_surface.default.hex}}

# ── ANSI colors (bright) ────────────────────────────────────────────────────

color8   {{colors.surface_variant.default.hex}}
color9   {{colors.error_container.default.hex}}
color10  {{colors.primary_container.default.hex}}
color11  {{colors.tertiary_container.default.hex}}
color12  {{colors.secondary_container.default.hex}}
color13  {{colors.on_secondary_container.default.hex}}
color14  {{colors.on_tertiary_container.default.hex}}
color15  {{colors.on_background.default.hex}}

# ── Mark colors (kitty hints / marks) ───────────────────────────────────────

mark1_foreground {{colors.on_primary.default.hex}}
mark1_background {{colors.primary.default.hex}}
mark2_foreground {{colors.on_secondary.default.hex}}
mark2_background {{colors.secondary.default.hex}}
mark3_foreground {{colors.on_tertiary.default.hex}}
mark3_background {{colors.tertiary.default.hex}}
